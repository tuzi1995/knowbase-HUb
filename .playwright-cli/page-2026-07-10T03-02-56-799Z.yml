                    - cell "找不到扫地机怎么办" [ref=f1e715]
                    - cell "1. 检查APP状态： **方法一**：打开石头 APP。如果机器人只是因为卡住触发了自我保护而暂停，但电池还有余电，APP的地图上通常会显示它最后停留的精确位置。 **方法二**：寻找功能：在石头 APP，进入扫地机操作页面，点击右上角【设置】图标，然后选择【更多功能】，点击【寻找机器人】。点击“寻找机器人”功能。点击后，如果机器人还有电，它会发出响亮的语音提示（如“主人，我在这里”），方便你循声寻找。 2. 如果APP无法提供线索，就需要出动人工寻找了。扫地机器人通常会卡在以下这些地方， 1. 建议重点排查：**低矮家具底部：床底、沙发底、电视柜下方**。这些地方空间狭窄，机器人进去后容易被卡住或耗尽电量。 2. 地面杂物周围：散落在地上的电源线、插排、数据线、孩子的玩具、拖鞋以及带有长流苏的地毯边缘。这些东西极易缠绕住机器人的轮子或主刷。 3. 空间死角：门槛的凹槽、椅子腿之间形成的狭窄迷宫、房间转角或门槛条处。 寻找技巧：带上手电筒，趴下来往家具深处照一照。如果机器人是因为没电关机，它通常是静默的，需要仔细查看角落。" [ref=f1e717]
