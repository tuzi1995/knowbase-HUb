                    - cell "扫地机配网发生失败，如何处理？" [ref=f1e1592]
                    - cell "常见情况 （1）支持 2.4G，5G 和双频合一的 WiFi 网络环境进行配网 （2）联网前请确认蓝牙和定位是开启状态 （3）密码的大小写字母确认清楚，密码错误会连接失败 （4）若是离线设备，需要先删除设备后再重新连接 若上述检查无误，辛苦查看您联网失败的页面，根据页面参考下方进行处理 1.连接设备页面显示失败，可能有以下原因导致： （1）手机蓝牙正常开启状态，同时当前位置权限也需要开启，连接时如有app位置授权弹窗时需要点击允许 （2）当前机器人需处在配网模式，机器人配网指示灯处于慢闪状态 2.设备传输信息页面显示失败，可能有以下原因导致： （1）需要打开局域网权限，如果已经打开，建议关闭APP尝试几次，如果没打开，建议打开再尝试（部分手机联网必须要改权限) （2）苹果手机需查看手机本地网络权限设置为允许后进行尝试，操作路径:进入手机设置-- 直接下滑找到Robo Rock APP点击进入--打开本地网络开关 3.设备绑定页面显示失败 （1）WIFI的名称及密码有无特殊字符，最好为字母数字组合 （2）密码输入需要准确确，注意区分大小写，有无空格 （3）不支持无密码wifi网络， 除此之外可能还有以下情况： （4）wifi6路由器有11n/ax mixed模式(混合模式)，推荐您打开此选项正常再尝试连接使用观察 （5）建议检查加密方式，如为WPA3超加方式WPA3为新-技术，选择选项后部分设可能会存在兼客性问题而无法接，则需要修改为WPA2RWPA2/WPA3。" [ref=f1e1594]
