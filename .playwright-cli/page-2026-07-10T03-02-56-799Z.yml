                    - cell "晒单" [ref=f1e1275]
                    - 'cell "您好，目前可参与抖音新机晒单活动，总规则如下： 如需查看具体晒单规则，可以输入品类 + 晒单，例如：扫地机晒单、洗地机晒单、吸尘器晒单、洗衣机晒单。 ## 一、参与方式 1. 在抖音发布内容，需带对应产品话题，发布20字以上文案+4张及以上图片，或15秒及以上视频至抖音平台； 2.发布完成后截图保存，通过下方链接填写提交； 3. 链接访问：可复制链接至浏览器打开参与（或点击下方入口））。 活动链接：https://mall.roborock.com/h5/commonPackage/pages/survey/index?id=5WafIV66xCHKSn&source=zhzs ## 二、活动说明 1. **参与限制**：同一用户、设备SN码或单笔订单，**仅可参与1次** 2. **配送范围**：仅限中国大陆地区地址 3. **赠品规则**：晒单赠品以提交问卷时的当期赠品为准，不可更换 4. **审核时效**：问卷提交后，**5个工作日内完成审核** 5. **领奖方式**：审核通过后，前往**石头科技官方商城小程序 → 我的 → 我的奖品**填写收货地址，提交后自动发货" [ref=f1e1277]'
