                    - cell "如何设置优先清扫一个区域？" [ref=f1e258]
                    - cell "您好,石头扫地机器人支持优先清扫指定区域,可通过以下三种方式灵活设置,满足个性化清洁需求： **一、设置固定优先清扫顺序** 1）进入房间清洁顺序设置 打开石头APP,进入【设备】页,点击【地图编辑】选择【清洁顺序】。 2）调整优先级 选择【手动编辑】点选房间,将需优先清扫的区域（如客厅）优先选择 → 保存设置。 3）启动任务 下次全屋清扫时,机器人将按设定顺序依次清扫。 **二、使用快捷指令一键优先清扫** 1）创建快捷指令 进入【设备】页 → 点击【指令】 → 【新建指令】。 2）添加新任务 对优先选择的区域 → 设定吸力、水量等参数 → 保存。 3）快速执行 需要时点击该指令,机器人会立即前往指定区域优先清扫。 **三、临时加扫功能（清扫中追加区域）** 1）任务中临时加扫 机器人清扫时,进入APP实时地图 → 点击【选区加扫】。 2）选择追加区域 框选需优先清扫的位置 → 确认后机器人暂停当前任务,立即清扫该区域。 3）自动恢复原任务 追加区域清扫完成后,机器人继续之前的清扫计划。 **四、注意事项** • 地图需提前保存：优先清扫前需确保全屋地图已生成并分区。" [ref=f1e260]
