                    - cell "要重新连接网络，您可以按照以下步骤操作： 1. **重置WiFi**：在扫地机开机状态下，同时按下开关机按键+回充按键，直到听到语音播报“重置WIFI，进入配网模式”，此时电源指示灯会开始蓝色慢闪，表示机器人已进入配网模式。 2. **添加设备**：打开石头APP首页，点击右上角的【+】按钮，选择手动添加或扫码添加您的扫地机。请确保手机蓝牙与定位已开启。 3. **检查网络环境**：支持 2.4G，5G 和双频合一的 WiFi 网络环境进行配网。此外，确保WIFI名称和密码没有特殊字符，最好为字母数字组合，注意区分大小写。 4. **异常处理**：如果仍然无法连接，可以尝试重启路由器、检查加密方式是否为WPA2，或者将苹果手机的本地网络权限设置为允许。也可以通过连接手机热点进入App检查固件版本，更新至最新版本后再次尝试连接。" [ref=f1e1555]
