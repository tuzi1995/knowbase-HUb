                    - cell "经常在一个地方卡住报错怎么办？" [ref=f1e629]
                    - 'cell "### **原因一** 机器人被卡住的区域，可能其宽度或高度与机身尺寸接近（如狭窄缝隙、低矮空间），导致机器人误入后无法脱困。 ### **解决方法** #### 1. **设置虚拟隔离区** 通过扫地机App设置 **软件禁区** 或 **虚拟墙**，阻止机器人进入该区域： - **操作步骤**： ① 开启机器人的 **地图保存模式**，完成一次完整清扫以生成准确地图； ② 在App地图界面中，点击右上角【地图编辑】，选择【禁区设置】添加「清洁禁区」或「虚拟墙」； ③ 圈选或绘制被卡区域，保存设置。 - **效果**：机器人后续清扫时会自动避开该区域，避免重复卡住。 #### 2. **物理隔离法** 若不便通过软件设置，可在被卡区域入口放置 **障碍物**，直接阻挡机器人进入。 ### **原因二** 机器人遇到超过其越障能力的门槛 / 台阶、或者推拉门地轨、卫生间挡水条时，容易发生卡困。 ### **解决方法** #### 1. **设置易卡门槛** 在 App-【地图编辑】中点击【地面环境】，在易卡门槛处等位置添加【易卡门槛】，机器人会自动调整越障策略； 若是遇到超过其越障能力的门槛 / 台阶，建议安装门槛条等，形成平缓过渡，便于通过" [ref=f1e631]'
