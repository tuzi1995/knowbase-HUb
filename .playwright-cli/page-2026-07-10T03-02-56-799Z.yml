                    - cell "怎样取出清洗槽滤网？" [ref=f1e465]
                    - cell "**清洗槽滤网清洁步骤** 1. 提起清洗槽滤网的卡扣，取出滤网。 2. 用水冲洗滤网，并使用柔软的干布清理并擦拭清洗槽内部。 3. 将滤网装回，按压时请确认听到“咔哒”声，以确保安装到位。 ️ **注意事项：** 若无法直接取下滤网，需要先取下拖布支架。您可以参考以下两种方法进行操作： * **方法一（自动任务法）：** 先操作机器返回基站进行洗布，随后开启一个拖地任务。待拖布支架自动取下后，即可顺利取出清洗槽滤网。 * **方法二（手动抽取法）：** 确保清洁液盒内液体大于100ml，连续抽拉清洁液盒三次，即可手动将拖布支架取出。" [ref=f1e467]
