                          - cell "主记录" [ref=f1e2900]
                          - cell "不变" [ref=f1e2901]
                          - cell "### 一、设置定时清扫步骤 1. 打开RoborockAPP，进入设备页面。 2. 点击页面右上角的【设置】按钮，找到并选择【定时任务】选项，接着点击【+】号添加定时。 3. 在新页面中，设定清扫的开始时间和重复次数，比如每天早上9点开始，或者工作日清扫。 4. 选择任务是全屋清洁、选区清洁、快捷指令 还是巡航模式，可以选择清洁模式如：扫地、拖地、先扫后拖等 5. 完成上述操作后，点击保存，定时清扫就设置好了。如果想查看设置情况，同..." [ref=f1e2903]:
                            - 'generic "### 一、设置定时清扫步骤 1. 打开RoborockAPP，进入设备页面。 2. 点击页面右上角的【设置】按钮，找到并选择【定时任务】选项，接着点击【+】号添加定时。 3. 在新页面中，设定清扫的开始时间和重复次数，比如每天早上9点开始，或者工作日清扫。 4. 选择任务是全屋清洁、选区清洁、快捷指令 还是巡航模式，可以选择清洁模式如：扫地、拖地、先扫后拖等 5. 完成上述操作后，点击保存，定时清扫就设置好了。如果想查看设置情况，同样可以在这个页面进行查看 。 ### 二、注意事项 1. **全屋及选区清扫**：当设定的是全屋清扫或者指定区域清扫任务时，即便机器人处于断网状态，只要到达设定的定时时间，机器人依然会正常开始清扫任务。 2. **快捷指令清扫**：要是设置的是快捷指令清扫任务，机器人断网后，就算到了指定时间，它也不会从充电桩出来执行清扫任务。这是因为快捷指令存储在服务器中，需要联网才能同步定时指令。 3. **勿扰模式**：开启勿扰模式，不会影响定时清扫任务正常启动，到时间扫地机仍会按计划开始清扫。" [ref=f1e2904]': "### 一、设置定时清扫步骤 1. 打开RoborockAPP，进入设备页面。 2. 点击页面右上角的【设置】按钮，找到并选择【定时任务】选项，接着点击【+】号添加定时。 3. 在新页面中，设定清扫的开始时间和重复次数，比如每天早上9点开始，或者工作日清扫。 4. 选择任务是全屋清洁、选区清洁、快捷指令 还是巡航模式，可以选择清洁模式如：扫地、拖地、先扫后拖等 5. 完成上述操作后，点击保存，定时清扫就设置好了。如果想查看设置情况，同..."
